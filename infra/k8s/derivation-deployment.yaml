apiVersion: apps/v1
kind: Deployment
metadata:
  name: derivation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: derivation-service
  template:
    metadata:
      labels:
        app: derivation-service
    spec:
      containers:
        - name: derivation-service
          image: your-registry/derivation-service:latest
          env:
            - name: CHAIN_ID
              value: "8453"
            - name: HEALTH_PORT
              value: "3002"
            - name: USE_KAFKA_PRIMARY
              value: "true"
          ports:
            - containerPort: 3002
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
